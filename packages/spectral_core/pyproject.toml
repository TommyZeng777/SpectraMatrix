[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "spectral-core"
version = "0.1.0"
description = "Core utilities for reproducible spectral experiments."
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
npz = ["numpy>=1.26"]
api = ["fastapi>=0.110", "uvicorn>=0.27"]

[project.scripts]
spectral = "spectral_core.cli.main:main"
spectral-api = "spectral_core.api.app:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
spectral_core = ["api/static/*", "api/static/vendor/*", "api/static/vendor/fonts/*"]
